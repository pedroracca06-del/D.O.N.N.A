services:
  - type: web
    name: donna
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DONNA_DATA_DIR
        value: /data
    disk:
      name: donna-data
      mountPath: /data
      sizeGB: 1
